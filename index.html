<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Restaurant Menu</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#222;
}

#book{
    width:100%;
    max-width:420px;
    height:90vh;
}

.page{

background:white;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

.page img{

width:100%;

height:100%;

object-fit:cover;

user-select:none;

pointer-events:none;

}

@media(max-width:768px){

body{

padding:0px;

}

#book{

width:95vw;

height:90vh;

}

}

</style>

</head>

<body>

<div id="book">

<div class="page">
<img src="img1.jpg">
</div>

<div class="page">
<img src="img2.jpg">
</div>

<div class="page">
<img src="img3.jpg">
</div>

<div class="page">
<img src="img4.jpg">
</div>

<div class="page">
<img src="img5.jpg">
</div>

</div>

<script>

const pageFlip = new St.PageFlip(

document.getElementById("book"),

{

width:350,

height:500,

size:"fixed",

minWidth:280,
maxWidth:420,

minHeight:400,
maxHeight:700,

showCover:false,

usePortrait:true,

autoSize:true,

mobileScrollSupport:true,

drawShadow:true,

maxShadowOpacity:0.7,

flippingTime:800,

clickEventForward:true,

startPage:0

}

);

pageFlip.loadFromHTML(
document.querySelectorAll(".page")
);

</script>

</body>
</html>
